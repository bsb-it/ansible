---
- name: "Sende Shutdown-Befehl an {{ item }}"
  community.vmware.vmware_guest_powerstate:
    hostname: "{{ lookup('env', 'VMWARE_HOST') }}"
    username: "{{ lookup('env', 'VMWARE_USER') }}"
    password: "{{ lookup('env', 'VMWARE_PASSWORD') }}"
    validate_certs: false
    name: "{{ item }}"
    state: shutdown-guest
  ignore_errors: yes

- name: "Warte aktiv, bis {{ item }} den Status poweredOff hat"
  community.vmware.vmware_guest_info:
    hostname: "{{ lookup('env', 'VMWARE_HOST') }}"
    username: "{{ lookup('env', 'VMWARE_USER') }}"
    password: "{{ lookup('env', 'VMWARE_PASSWORD') }}"
    validate_certs: false
    name: "{{ item }}"
    schema: "vsphere"
    properties:
      - runtime.powerState
  register: vm_info
  # Die Loop-Wiederholung (until) nutzt die Info-Abfrage
  until: 
    - vm_info.instance is defined
    - vm_info.instance.runtime.powerState == 'poweredOff'
  retries: 60  # Erhöht auf 60 Versuche
  delay: 10    # Alle 10 Sekunden = 10 Minuten Puffer
