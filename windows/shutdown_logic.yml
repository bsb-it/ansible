- name: "Sende Shutdown-Befehl an {{ item }}"
  community.vmware.vmware_guest_powerstate:
    hostname: "{{ lookup('env', 'VMWARE_HOST') }}"
    username: "{{ lookup('env', 'VMWARE_USER') }}"
    password: "{{ lookup('env', 'VMWARE_PASSWORD') }}"
    validate_certs: false
    name: "{{ item }}"
    state: shutdown-guest
  register: shutdown_cmd
  ignore_errors: yes

- name: "Warte, bis {{ item }} vollständig ausgeschaltet ist"
  community.vmware.vmware_guest_powerstate:
    hostname: "{{ lookup('env', 'VMWARE_HOST') }}"
    username: "{{ lookup('env', 'VMWARE_USER') }}"
    password: "{{ lookup('env', 'VMWARE_PASSWORD') }}"
    validate_certs: false
    name: "{{ item }}"
    state: poweredoff  # In diesem Modus ist das Modul "idempotent"
  register: final_status
  # Wir prüfen direkt den Status im Hauptobjekt oder nutzen die eingebaute Logik
  until: >
    final_status.instance is defined and 
    final_status.instance.hw_power_status == 'poweredOff'
  retries: 30
  delay: 10
