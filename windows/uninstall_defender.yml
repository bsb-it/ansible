---
# Uninstall Windows-Defender

- name: Check
  hosts:
    - all
  serial:
    - 1
  #  strategy: free
  gather_facts: no
  
  tasks:
    - name: Version
      ansible.windows.win_powershell:
        script: |
          Uninstall-WindowsFeature -Name Windows-Defender
      register: uninstall_defender_result

    - name: print variable
      debug:
        msg: '{{ uninstall_defender_result.output }}'

    - name: Reboot Server
      ansible.windows.win_reboot:
      register: reboot_result

    - name: print variable
      debug:
        msg: '{{ reboot_result }}'
