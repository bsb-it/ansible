---
- name: Virtuelle Maschinen in vSphere herunterfahren
  hosts: localhost
  gather_facts: false
  vars:
    # Diese Liste kann via AWX Survey (als Liste) überschrieben werden
    target_vms:
      - "WEC01"
      - "WEC02"
      - "WEC03"
  tasks:
    - name: "Fahre VM {{ vm_name }} kontrolliert herunter"
      community.vmware.vmware_guest_powerstate:
        hostname: "{{ lookup('env', 'VMWARE_HOST') }}"
        username: "{{ lookup('env', 'VMWARE_USER') }}"
        password: "{{ lookup('env', 'VMWARE_PASSWORD') }}"
        validate_certs: false
        name: "{{ item }}"
        state: shutdown-guest  # Versucht einen sauberen OS-Shutdown via VMware Tools
      loop: "{{ target_vms }}"
      register: shutdown_results
      ignore_errors: yes

    - name: "Zusammenfassung und Erfolgskontrolle"
      debug:
        msg: >
          VM: {{ item.item }} - 
          Status: {{ 'Erfolgreich heruntergefahren' if not item.failed 
          else 'Fehlgeschlagen (evtl. keine VMware Tools)' }}
      loop: "{{ shutdown_results.results }}"

    # Optionaler Task: Wenn der sanfte Shutdown fehlschlägt, hier hart ausschalten
    - name: "Erzwinge Ausschalten (Hard Power Off) bei Fehlern"
      community.vmware.vmware_guest_powerstate:
        hostname: "{{ lookup('env', 'VMWARE_HOST') }}"
        username: "{{ lookup('env', 'VMWARE_USER') }}"
        password: "{{ lookup('env', 'VMWARE_PASSWORD') }}"
        validate_certs: false
        name: "{{ item.item }}"
        state: powered-off
      loop: "{{ shutdown_results.results }}"
      when: item.failed 
      # Dieser Task läuft nur für die VMs, die im ersten Schritt einen Fehler geworfen haben
