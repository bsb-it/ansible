---
- name: Virtuelle Maschinen in vSphere herunterfahren
  hosts: localhost
  gather_facts: false
  vars:
    # Diese Liste kann via AWX Survey (als Liste) überschrieben werden
    target_vms:
      - "WEC01"
      - "WEC02"
      - "WEC03"
  tasks:
    - name: "Fahre VM {{ vm_name }} kontrolliert herunter"
      community.vmware.vmware_guest_powerstate:
        hostname: "{{ lookup('env', 'VMWARE_HOST') }}"
        username: "{{ lookup('env', 'VMWARE_USER') }}"
        password: "{{ lookup('env', 'VMWARE_PASSWORD') }}"
        validate_certs: false
        name: "{{ item }}"
        state: shutdown-guest  # Versucht einen sauberen OS-Shutdown via VMware Tools
      loop: "{{ target_vms }}"
      register: shutdown_results
      ignore_errors: yes

    - name: "Erzwinge Ausschalten, falls Gast-Shutdown fehlschlägt"
      community.vmware.vmware_guest_powerstate:
        hostname: "{{ lookup('env', 'VMWARE_HOST') }}"
        username: "{{ lookup('env', 'VMWARE_USER') }}"
        password: "{{ lookup('env', 'VMWARE_PASSWORD') }}"
        validate_certs: false
        name: "{{ item }}"
        state: poweredoff
      loop: "{{ target_vms }}"
      when: 
        - item.failed
        - force_poweroff | bool

    - name: "Zusammenfassung anzeigen"
      debug:
        msg: "VM {{ item.item }} Status: {{ 'Erfolgreich' if not item.failed else 'Fehlgeschlagen' }}"
      loop: "{{ shutdown_results.results }}"
